global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── Alert rules ──────────────────────────────────────────────────────────────
rule_files:
  - "/etc/prometheus/alert_rules.yml"

# ── Alertmanager ─────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Scrape targets ────────────────────────────────────────────────────────────
scrape_configs:
  - job_name: flask-app
    static_configs:
      - targets:
          - app:5000   # Uses Docker internal network to reach the app directly

  - job_name: node
    static_configs:
      - targets:
          - localhost:9100    # Node Exporter: OS-level CPU/memory/disk

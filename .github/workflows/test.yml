name: Tests

on:
  push:
  pull_request:
    branches: [main]
  workflow_call:
    outputs:
      result:
        description: "test outcome"
        value: ${{ jobs.integration.result }}

jobs:
  # ── Job 1: Lint Dockerfile with hadolint ──────────────────────────────────
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

  # ── Job 2: Unit tests (no database, no network) ────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install uv && uv sync --group dev

      - name: Run unit tests
        run: |
          .venv/bin/pytest tests/unit/ \
            --tb=short \
            --cov=app.utils \
            --cov=app.seed \
            --cov-report=term-missing \
            -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: .coverage

  # ── Job 3: Integration tests (real PostgreSQL) ─────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hackathon_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_HOST: localhost
      DATABASE_NAME: hackathon_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_PORT: "5432"
      DATABASE_READ_HOST: ""
      SECRET_KEY: ci-integration-test-secret
      REDIS_URL: "redis://localhost:19999/0"   # unreachable → SimpleCache fallback

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install uv && uv sync --group dev

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -U postgres; do
            echo "Waiting for postgres..." && sleep 1
          done

      - name: Run integration tests
        run: |
          .venv/bin/pytest tests/integration/ \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-coverage
          path: coverage.xml

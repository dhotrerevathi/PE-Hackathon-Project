name: CI / CD

# Only runs on pushes to main (PRs use test.yml only).
# Pipeline: Test → Build & Push image → Deploy to droplet
on:
  push:
    branches: [main]

# Cancel any in-progress run for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Image name: ghcr.io/OWNER/REPO  (e.g. ghcr.io/portalzone/pe-hackathon-template-2026)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Stage 1: Run the full test suite ───────────────────────────────────────
  # Reuses .github/workflows/test.yml — lint → unit → integration
  test:
    name: Test Suite
    uses: ./.github/workflows/test.yml

  # ── Stage 2: Build Docker image and push to GHCR ──────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write   # Required to push to GHCR

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      # Docker registry names must be lowercase; github.repository may have uppercase
      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      # Multi-platform builds (arm64 for newer DO droplets, amd64 for standard)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GITHUB_TOKEN is automatically provided — no extra secret needed for GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: latest + short SHA (e.g. ghcr.io/owner/repo:abc1234)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GHCR to speed up subsequent builds
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max

      - name: Print image details
        run: |
          echo "Image: ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.push.outputs.digest }}"

  # ── Stage 3: Deploy to DigitalOcean droplet ────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production   # Enables environment protection rules in GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      # ── 3a. Write .env on the server from GitHub Secrets ─────────────────
      # Secrets are injected by GitHub Actions at runtime — never stored in repo.
      # The heredoc is expanded on the runner (values masked in logs), written
      # to the server via SSH. This is "on-the-fly" secret management.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          script: |
            set -euo pipefail

            DEPLOY_DIR="/opt/urlshortener"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            # ── Pull latest code (compose files, nginx config, etc.) ─────
            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }}.git .
            fi
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}

            # ── Write .env from secrets (never committed to repo) ─────────
            # Rotate this file on every deploy so stale secrets don't linger.
            DB_PASS="${{ secrets.DATABASE_PASSWORD }}"
            DB_PASS="${DB_PASS:-postgres}"

            printf '%s\n' \
              "SECRET_KEY=${{ secrets.SECRET_KEY }}" \
              "DATABASE_PASSWORD=${DB_PASS}" \
              "DATABASE_NAME=hackathon_db" \
              "DATABASE_HOST=db" \
              "DATABASE_PORT=5432" \
              "DATABASE_USER=postgres" \
              "DATABASE_READ_HOST=" \
              "REDIS_URL=redis://redis:6379/0" \
              "PORT=5000" \
              "GUNICORN_WORKERS=2" \
              "APP_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}" \
              > .env
            chmod 600 .env

            # ── DB credential recovery ────────────────────────────────────
            # Use TCP (-h 127.0.0.1) instead of Unix socket so PostgreSQL
            # actually checks the password (Unix socket uses trust auth).
            # If auth fails the volume was initialised with a different password;
            # drop it so PostgreSQL reinitialises with the current one.
            if ! docker compose -f docker-compose.1gb.yml exec -T \
                -e PGPASSWORD="${DB_PASS}" db \
                psql -h 127.0.0.1 -p 5432 -U postgres -d hackathon_db \
                -c "SELECT 1;" > /dev/null 2>&1; then
              echo "DB credential mismatch — resetting postgres volume for fresh init."
              docker compose -f docker-compose.1gb.yml stop db  || true
              docker compose -f docker-compose.1gb.yml rm -f db || true
              docker volume rm urlshortener_postgres_data        2>/dev/null || true
              echo "Volume cleared. PostgreSQL will reinitialise with the current password."
            fi

            # ── Log in to GHCR on the server ─────────────────────────────
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # ── Pull the exact image built in stage 2 ────────────────────
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}

            # ── Start all services (nginx, app, db, redis) ───────────────
            # 'up -d' is idempotent: running containers are left untouched,
            # only the app is recreated because its image changed.
            docker compose -f docker-compose.1gb.yml up -d

            # ── Health check — port 80 via nginx ─────────────────────────
            # Allow up to 3 minutes: first deploy seeds DB with Faker which
            # takes ~60s on a 1vCPU droplet.
            echo "Waiting for app to become healthy..."
            for i in $(seq 1 36); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health || true)
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (attempt $i)"
                break
              fi
              echo "Attempt $i: status=$STATUS, retrying..."
              sleep 5
              if [ "$i" = "36" ]; then
                echo "Health check failed after 3 minutes."
                docker compose -f docker-compose.1gb.yml logs --tail=50 app
                exit 1
              fi
            done

            # ── Clean up old images to save disk space ────────────────────
            docker image prune -f

            echo "Deployment complete."
            echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}"

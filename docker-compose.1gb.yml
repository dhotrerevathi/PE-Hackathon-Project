# Memory-optimised compose for a 1 GB droplet + 2 GB swap.
#
# Changes vs docker-compose.yml:
#   - db-replica REMOVED  (replica belongs on a second node, not same droplet)
#   - Gunicorn workers     2  (was 4)
#   - PostgreSQL tuned     shared_buffers=32MB, work_mem=4MB  (was 128MB/default)
#   - Redis maxmemory      64mb  (was 256mb)
#   - mem_limit on every service so the OOM-killer targets containers before the OS
#
# Memory budget (resident):
#   OS + Docker daemon  ~270 MB
#   nginx               ~20 MB  (limit 32 MB)
#   app  (2 workers)    ~160 MB  (limit 200 MB)
#   db                  ~75 MB  (limit 128 MB)
#   redis               ~20 MB  (limit 80 MB)
#   ─────────────────────────────────────────
#   Total               ~545 MB  ← fits in 1 GB with ~455 MB headroom
#   Swap acts as safety net for traffic spikes.
#
# Usage:
#   docker compose -f docker-compose.1gb.yml up --build

services:

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    mem_limit: 32m
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  app:
    image: ${APP_IMAGE:-app-local:latest}
    build:
      context: .
    restart: unless-stopped
    mem_limit: 200m
    # No host port mapping — nginx handles all external traffic.
    # Removing ports enables: docker compose up --scale app=2
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-random-secret}
      DATABASE_HOST: db
      DATABASE_READ_HOST: ""       # No replica on 1 GB — reads hit the primary
      DATABASE_PORT: 5432
      DATABASE_NAME: hackathon_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
      PORT: 5000
      GUNICORN_WORKERS: 1          # Prevents Prometheus metric flapping
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 128m
    # Tuned for low-RAM: shared_buffers governs how much RAM PG uses for caching.
    # 32 MB is enough for a hackathon workload; Redis handles the hot redirect cache.
    command: >
      postgres
      -c shared_buffers=32MB
      -c effective_cache_size=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=16MB
      -c max_connections=50
      -c wal_level=minimal
      -c max_wal_senders=0
      -c checkpoint_completion_target=0.9
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hackathon_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 80m
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    mem_limit: 128m
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - app
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    mem_limit: 64m
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'

  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=hackathon
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards/data:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:

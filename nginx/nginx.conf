worker_processes auto;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logging (document: §Logging, metrics, automation) ---
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent rt=$request_time '
                    'cache=$upstream_cache_status';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # --- Performance ---
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip static + API responses (CDN-style compression, document: §CDN)
    gzip on;
    gzip_types text/html text/css application/javascript application/json text/plain;
    gzip_min_length 256;
    gzip_proxied any;

    # --- Rate limiting (document: §Rate limiter) ---
    # Strict zone for URL creation: 10 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=shorten:10m rate=10r/m;
    # Generous zone for redirects: 60/min (main traffic)
    limit_req_zone $binary_remote_addr zone=redirect:10m rate=60r/m;

    limit_req_status 429;

    # Docker internal DNS — re-resolve on every request so nginx picks up
    # new containers added via: docker compose up --scale app=N
    resolver 127.0.0.11 valid=10s ipv6=off;

    # --- Upstream: Docker DNS round-robins across scaled app containers ---
    # least_conn sends each new request to the instance with the fewest active connections.
    # (document: §Load balancer + §Stateless web tier — any server can handle any request)
    upstream app_servers {
        least_conn;
        server app:5000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Retry on error/timeout — routes to another app instance if one is down
        # (document: §If server 1 goes offline, all the traffic will be routed to server 2)
        proxy_next_upstream error timeout http_502 http_503;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;

        # --- Grafana monitoring ---
        # proxy_pass trailing slash strips /grafana/ prefix before forwarding.
        # proxy_redirect rewrites Location headers from Grafana's internal hostname
        # back to the public URL so the browser never sees host.docker.internal.
        # X-Forwarded-Host lets Grafana construct correct absolute redirect URLs.
        location /grafana/ {
            # No trailing slash on proxy_pass — Nginx forwards the full /grafana/
            # path to Grafana instead of stripping it. Required when Grafana is
            # configured with serve_from_sub_path = true.
            proxy_pass http://host.docker.internal:3000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            # Grafana constructs correct absolute redirect URLs via root_url,
            # so we don't need Nginx to rewrite Location headers.
            proxy_redirect off;
        }

        # --- Short URL redirect: hot path, light rate limit ---
        location ~* "^/[A-Za-z0-9_-]{1,20}$" {
            limit_req zone=redirect burst=30 nodelay;
            proxy_pass http://app_servers;
        }

        # --- URL creation: strict rate limit ---
        location = /urls/new {
            limit_req zone=shorten burst=5 nodelay;
            proxy_pass http://app_servers;
        }
        location = /api/urls {
            limit_req zone=shorten burst=5 nodelay;
            proxy_pass http://app_servers;
        }

        # --- Health check: no rate limit, no logging ---
        location = /health {
            access_log off;
            proxy_pass http://app_servers;
        }

        # --- Everything else ---
        location / {
            proxy_pass http://app_servers;
        }
    }
}

{% extends "base.html" %}
{% block title %}New URL — URLShort{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="d-flex align-items-center gap-2 mb-4">
      <a href="/urls" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
      <h4 class="fw-bold mb-0">Shorten a URL</h4>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="POST" action="/urls/new">
          <div class="mb-3">
            <label class="form-label fw-semibold">Destination URL <span class="text-danger">*</span></label>
            <input type="url" name="original_url" class="form-control" placeholder="https://example.com/your/long/url"
              value="{{ form.original_url or '' }}" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Title <span class="text-muted fw-normal">(optional)</span></label>
            <input type="text" name="title" class="form-control" placeholder="Descriptive title for this link"
              value="{{ form.title or '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Custom short code <span class="text-muted fw-normal">(optional)</span></label>
            <div class="input-group">
              <span class="input-group-text text-muted small">yoursite.com/</span>
              <input type="text" name="short_code" class="form-control" placeholder="auto-generated" maxlength="20"
                value="{{ form.short_code or '' }}" pattern="[A-Za-z0-9_-]+">
            </div>
            <div class="form-text">Letters, numbers, hyphens, and underscores only.</div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">User ID <span class="text-muted fw-normal">(optional)</span></label>
            <input type="number" name="user_id" class="form-control" placeholder="Link to a user"
              value="{{ form.user_id or '' }}">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-grow-1"><i class="bi bi-scissors"></i> Shorten URL</button>
            <a href="/urls" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
